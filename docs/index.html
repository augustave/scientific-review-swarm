<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Review Swarm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;
  --gap:2px;
}
body{
  background:var(--bg);
  font-family:'SF Mono','Fira Code','Courier New',monospace;
  color:#fff;
  -webkit-font-smoothing:antialiased;
}

/* HEADER */
.header{
  padding:32px 24px 20px;
  max-width:1200px;
  margin:0 auto;
}
.header h1{
  font-size:clamp(1.4rem,4vw,2.4rem);
  font-weight:800;
  letter-spacing:0.18em;
  text-transform:uppercase;
  line-height:1.1;
}
.header .subtitle{
  font-size:0.7rem;
  color:rgba(255,255,255,0.4);
  text-transform:uppercase;
  letter-spacing:0.12em;
  margin-top:6px;
}
.header .badge{
  display:inline-block;
  background:#D50000;
  color:#fff;
  font-size:0.55rem;
  font-weight:800;
  padding:2px 8px;
  letter-spacing:0.1em;
  margin-left:8px;
  vertical-align:middle;
}
.filters{
  display:flex;
  gap:6px;
  margin-top:16px;
  flex-wrap:wrap;
}
.filters button{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.5);
  font-family:inherit;
  font-size:0.6rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  padding:6px 14px;
  cursor:pointer;
  transition:all 0.2s;
}
.filters button:hover,
.filters button.active{
  background:rgba(255,255,255,0.15);
  color:#fff;
  border-color:rgba(255,255,255,0.3);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:var(--gap);
  max-width:1200px;
  margin:0 auto;
  padding:0 var(--gap);
}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.grid{grid-template-columns:1fr}}

/* CARD */
.card{
  aspect-ratio:1;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:16px;
  cursor:pointer;
  transition:transform 0.25s ease,box-shadow 0.25s ease;
}
.card:hover{
  transform:scale(1.02);
  z-index:2;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.card svg.bg-pattern{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  opacity:0.2;
  transition:opacity 0.3s;
  pointer-events:none;
}
.card:hover svg.bg-pattern{
  opacity:0.45;
}
.card-cell{
  position:relative;z-index:1;
  font-size:0.5rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.2em;
  opacity:0.5;
  margin-bottom:4px;
}
.card-title{
  position:relative;z-index:1;
  font-size:clamp(0.75rem,2vw,1rem);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.08em;
  line-height:1.2;
}
.card-stat{
  position:relative;z-index:1;
  font-size:clamp(1.6rem,4vw,2.8rem);
  font-weight:800;
  line-height:1;
  margin-bottom:4px;
}
.card-stat-label{
  position:relative;z-index:1;
  font-size:0.55rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.15em;
  opacity:0.6;
}
.card.dim{opacity:0.15;pointer-events:none;transition:opacity 0.3s}

/* MODAL */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);
  z-index:100;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.modal-overlay.open{display:flex}
.modal{
  background:#111;
  border:1px solid rgba(255,255,255,0.1);
  max-width:600px;
  width:100%;
  max-height:85vh;
  overflow-y:auto;
  padding:32px;
}
.modal h2{
  font-size:1.2rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:4px;
}
.modal .modal-cell{
  font-size:0.6rem;
  color:rgba(255,255,255,0.4);
  text-transform:uppercase;
  letter-spacing:0.15em;
  margin-bottom:16px;
}
.modal .modal-desc{
  font-size:0.8rem;
  line-height:1.6;
  color:rgba(255,255,255,0.7);
  margin-bottom:20px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.modal .modal-section{
  margin-bottom:16px;
}
.modal .modal-section h3{
  font-size:0.6rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.15em;
  color:rgba(255,255,255,0.4);
  margin-bottom:8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding-bottom:4px;
}
.modal .relevance-row{
  display:flex;
  justify-content:space-between;
  font-size:0.7rem;
  padding:3px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.modal .relevance-row .val{font-weight:700}
.modal .relevance-row .val.high{color:#00C853}
.modal .relevance-row .val.med{color:#FFD600}
.modal .relevance-row .val.low{color:rgba(255,255,255,0.2)}
.modal-close{
  position:absolute;top:16px;right:20px;
  background:none;border:none;color:#fff;
  font-size:1.4rem;cursor:pointer;opacity:0.4;
  font-family:inherit;
}
.modal-close:hover{opacity:1}
.modal-wrap{position:relative}
.modal .color-bar{
  height:4px;
  margin-bottom:20px;
}

/* FOOTER */
.footer{
  max-width:1200px;
  margin:0 auto;
  padding:32px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
}
.footer a{
  color:rgba(255,255,255,0.3);
  text-decoration:none;
  font-size:0.6rem;
  text-transform:uppercase;
  letter-spacing:0.12em;
  transition:color 0.2s;
}
.footer a:hover{color:#fff}
.footer .copy{
  font-size:0.55rem;
  color:rgba(255,255,255,0.15);
  text-transform:uppercase;
  letter-spacing:0.1em;
}
</style>
</head>
<body>

<div class="header">
  <h1>Scientific Review Swarm <span class="badge">v1.0.0</span></h1>
  <div class="subtitle">15 scientific-domain agents reviewing defense-aerospace projects</div>

    <button class="active" data-filter="all">All</button>

    <button data-filter="life">Life Sciences</button>
    <button data-filter="meta">Project</button>
  </div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-wrap">
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal" id="modal-content"></div>
  </div>
</div>

<div class="footer">
  <div>
    <a href="https://github.com/augustave/scientific-review-swarm" target="_blank">GitHub</a>
  </div>
  <div class="copy">augustave / scientific-review-swarm</div>

// ── SVG PATTERNS ──────────────────────────────────
function svgPattern(type, textColor) {
  const c = textColor === '#0a0a0a' ? '0,0,0' : '255,255,255';
  const s = (opacity) => `rgba(${c},${opacity})`;
  switch(type) {
    case 'hexmesh': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><defs><pattern id="hex" width="60" height="52" patternUnits="userSpaceOnUse"><polygon points="30,2 55,15 55,37 30,50 5,37 5,15" fill="none" stroke="${s(0.4)}" stroke-width="1"/></pattern></defs><rect width="400" height="400" fill="url(#hex)"/>${[...Array(8)].map((_,i)=>`<circle cx="${50+i*45}" cy="${200+Math.sin(i)*60}" r="${3+i%3}" fill="${s(0.5)}"/>`).join('')}</svg>`;

    case 'target': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${[1,2,3,4,5,6].map(i=>`<circle cx="200" cy="200" r="${i*32}" fill="none" stroke="${s(0.3)}" stroke-width="${7-i}"/>`).join('')}<circle cx="200" cy="200" r="8" fill="${s(0.5)}"/><line x1="200" y1="40" x2="200" y2="360" stroke="${s(0.15)}" stroke-width="1"/><line x1="40" y1="200" x2="360" y2="200" stroke="${s(0.15)}" stroke-width="1"/></svg>`;

    case 'gates': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${[0,1,2,3].map(i=>{const x=60+i*93;return `<polygon points="${x},160 ${x+30},190 ${x},220 ${x-30},190" fill="none" stroke="${s(0.4)}" stroke-width="2"/><text x="${x}" y="${195}" text-anchor="middle" font-size="12" font-weight="800" fill="${s(0.4)}" font-family="monospace">G${i+1}</text>${i<3?`<line x1="${x+30}" y1="190" x2="${x+63}" y2="190" stroke="${s(0.25)}" stroke-width="2" stroke-dasharray="4,4"/>`:''}`}).join('')}</svg>`;

    case 'lattice': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';for(let y=0;y<10;y++)for(let x=0;x<10;x++){const px=x*42+20,py=y*42+20;r+=`<rect x="${px-4}" y="${py-4}" width="8" height="8" fill="${s(0.3)}" transform="rotate(45,${px},${py})"/>`;if(x<9)r+=`<line x1="${px+4}" y1="${py}" x2="${px+38}" y2="${py}" stroke="${s(0.2)}" stroke-width="1"/>`;if(y<9)r+=`<line x1="${px}" y1="${py+4}" x2="${px}" y2="${py+38}" stroke="${s(0.2)}" stroke-width="1"/>`;if(x<9&&y<9)r+=`<line x1="${px+4}" y1="${py+4}" x2="${px+38}" y2="${py+38}" stroke="${s(0.1)}" stroke-width="0.5"/>`}return r})()}</svg>`;

    case 'orbital': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><circle cx="200" cy="200" r="6" fill="${s(0.5)}"/>${[60,100,140,180].map((r,i)=>`<ellipse cx="200" cy="200" rx="${r}" ry="${r*0.4}" fill="none" stroke="${s(0.3)}" stroke-width="1" transform="rotate(${i*45},200,200)"/><circle cx="${200+r*Math.cos(i*1.2)}" cy="${200+r*0.4*Math.sin(i*1.2)}" r="3" fill="${s(0.5)}" transform="rotate(${i*45},200,200)"/>`).join('')}</svg>`;

    case 'mesh': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';const pts=[];for(let y=0;y<12;y++)for(let x=0;x<12;x++){const px=x*36+18+(y%2?18:0),py=y*34+18;pts.push([px,py]);r+=`<circle cx="${px}" cy="${py}" r="1.5" fill="${s(0.3)}"/>`}for(let y=0;y<12;y++)for(let x=0;x<12;x++){const i=y*12+x;if(x<11)r+=`<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[i+1][0]}" y2="${pts[i+1][1]}" stroke="${s(0.2)}" stroke-width="0.5"/>`;if(y<11)r+=`<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[i+12]?pts[i+12][0]:0}" y2="${pts[i+12]?pts[i+12][1]:0}" stroke="${s(0.2)}" stroke-width="0.5"/>`}return r})()}</svg>`;

    case 'scatter': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><line x1="40" y1="360" x2="380" y2="360" stroke="${s(0.2)}" stroke-width="1"/><line x1="40" y1="360" x2="40" y2="40" stroke="${s(0.2)}" stroke-width="1"/>${[...Array(40)].map((_,i)=>{const x=50+Math.random()*310,y=60+Math.random()*280;return `<circle cx="${x}" cy="${y}" r="${2+Math.random()*4}" fill="${s(0.15+Math.random()*0.2)}"/>`}).join('')}${[...Array(8)].map((_,i)=>{const x=55+i*42,h=40+Math.random()*200;return `<rect x="${x}" y="${360-h}" width="28" height="${h}" fill="${s(0.1)}"/>`}).join('')}</svg>`;

    case 'circuit': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';const nodes=[[100,80],[200,80],[300,80],[60,180],[160,180],[260,180],[340,180],[100,280],[200,280],[300,280],[150,360],[250,360]];nodes.forEach(([x,y])=>r+=`<rect x="${x-5}" y="${y-5}" width="10" height="10" fill="${s(0.3)}"/>`);const links=[[0,1],[1,2],[0,3],[1,4],[2,5],[2,6],[3,7],[4,8],[5,9],[7,10],[8,10],[9,11],[8,11]];links.forEach(([a,b])=>{const[x1,y1]=nodes[a],[x2,y2]=nodes[b];if(x1===x2||y1===y2)r+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${s(0.25)}" stroke-width="1.5"/>`;else r+=`<polyline points="${x1},${y1} ${x1},${y2} ${x2},${y2}" fill="none" stroke="${s(0.25)}" stroke-width="1.5"/>`});return r})()}</svg>`;

    case 'neural': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';const layers=[[80,[100,200,300]],[200,[80,160,240,320]],[320,[100,200,300]]];layers.forEach(([x,ys],li)=>{ys.forEach((y,ni)=>{r+=`<circle cx="${x}" cy="${y}" r="8" fill="${s(0.15)}" stroke="${s(0.35)}" stroke-width="1.5"/>`;if(li<layers.length-1){const[nx,nys]=layers[li+1];nys.forEach(ny=>r+=`<line x1="${x}" y1="${y}" x2="${nx}" y2="${ny}" stroke="${s(0.12)}" stroke-width="0.8"/>`)}})});return r})()}</svg>`;

    case 'molecule': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';const hex=(cx,cy,sz)=>{const pts=[];for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;pts.push([cx+sz*Math.cos(a),cy+sz*Math.sin(a)])}pts.forEach(([x,y],i)=>{const[nx,ny]=pts[(i+1)%6];r+=`<line x1="${x}" y1="${y}" x2="${nx}" y2="${ny}" stroke="${s(0.35)}" stroke-width="1.5"/>`;r+=`<circle cx="${x}" cy="${y}" r="4" fill="${s(0.25)}"/>`})};hex(150,160,50);hex(250,160,50);hex(200,250,50);hex(200,80,40);hex(120,290,40);hex(300,290,40);return r})()}</svg>`;

    case 'document': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><rect x="100" y="60" width="200" height="280" fill="none" stroke="${s(0.3)}" stroke-width="2"/><rect x="100" y="60" width="200" height="40" fill="${s(0.1)}"/>${[0,1,2,3,4,5].map(i=>`<line x1="130" y1="${130+i*32}" x2="${250+Math.random()*30}" y2="${130+i*32}" stroke="${s(0.2)}" stroke-width="${i===0?3:1.5}"/>`).join('')}<circle cx="250" cy="290" r="25" fill="none" stroke="${s(0.35)}" stroke-width="2"/><polyline points="240,290 248,298 264,278" fill="none" stroke="${s(0.4)}" stroke-width="2.5"/></svg>`;

    case 'helix': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';const steps=24;for(let i=0;i<steps;i++){const y=30+i*(340/steps);const x1=200+Math.sin(i*0.52)*80;const x2=200-Math.sin(i*0.52)*80;r+=`<circle cx="${x1}" cy="${y}" r="4" fill="${s(0.3)}"/>`;r+=`<circle cx="${x2}" cy="${y}" r="4" fill="${s(0.3)}"/>`;if(i%3===0)r+=`<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${s(0.2)}" stroke-width="1.5"/>`;if(i>0){const py=30+(i-1)*(340/steps);const px1=200+Math.sin((i-1)*0.52)*80;const px2=200-Math.sin((i-1)*0.52)*80;r+=`<line x1="${px1}" y1="${py}" x2="${x1}" y2="${y}" stroke="${s(0.25)}" stroke-width="1"/>`;r+=`<line x1="${px2}" y1="${py}" x2="${x2}" y2="${y}" stroke="${s(0.25)}" stroke-width="1"/>`}}return r})()}</svg>`;

    case 'peaks': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><line x1="30" y1="360" x2="370" y2="360" stroke="${s(0.2)}" stroke-width="1"/>${[...Array(30)].map((_,i)=>{const x=35+i*11;const h=20+Math.random()*280*(i%7===3?1:i%5===2?0.7:0.3);return `<rect x="${x}" y="${360-h}" width="6" height="${h}" fill="${s(0.15+Math.random()*0.2)}"/>`}).join('')}</svg>`;

    case 'fork': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><circle cx="200" cy="80" r="20" fill="none" stroke="${s(0.35)}" stroke-width="2"/><text x="200" y="85" text-anchor="middle" font-size="14" fill="${s(0.4)}" font-family="monospace">N</text><line x1="200" y1="100" x2="200" y2="160" stroke="${s(0.25)}" stroke-width="2"/><text x="200" y="180" text-anchor="middle" font-size="10" fill="${s(0.3)}" font-family="monospace">RANDOMIZE</text><line x1="200" y1="190" x2="120" y2="240" stroke="${s(0.25)}" stroke-width="2"/><line x1="200" y1="190" x2="280" y2="240" stroke="${s(0.25)}" stroke-width="2"/><rect x="85" y="240" width="70" height="35" fill="${s(0.1)}" stroke="${s(0.3)}" stroke-width="1.5"/><text x="120" y="262" text-anchor="middle" font-size="10" fill="${s(0.4)}" font-family="monospace">ARM A</text><rect x="245" y="240" width="70" height="35" fill="${s(0.1)}" stroke="${s(0.3)}" stroke-width="1.5"/><text x="280" y="262" text-anchor="middle" font-size="10" fill="${s(0.4)}" font-family="monospace">ARM B</text><line x1="120" y1="275" x2="120" y2="320" stroke="${s(0.25)}" stroke-width="2"/><line x1="280" y1="275" x2="280" y2="320" stroke="${s(0.25)}" stroke-width="2"/><circle cx="120" cy="340" r="15" fill="none" stroke="${s(0.3)}" stroke-width="1.5"/><circle cx="280" cy="340" r="15" fill="none" stroke="${s(0.3)}" stroke-width="1.5"/></svg>`;

    case 'heartcircuit': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><path d="M200,320 C200,320 80,230 80,160 C80,110 120,80 160,80 C180,80 200,100 200,100 C200,100 220,80 240,80 C280,80 320,110 320,160 C320,230 200,320 200,320Z" fill="none" stroke="${s(0.3)}" stroke-width="2"/>${[140,180,220,260].map(x=>`<line x1="${x}" y1="140" x2="${x}" y2="240" stroke="${s(0.15)}" stroke-width="1"/>`).join('')}${[160,200,240].map(y=>`<line x1="120" y1="${y}" x2="280" y2="${y}" stroke="${s(0.15)}" stroke-width="1"/>`).join('')}${[[160,160],[200,180],[240,200],[200,220],[160,200]].map(([x,y])=>`<circle cx="${x}" cy="${y}" r="4" fill="${s(0.4)}"/>`).join('')}<polyline points="160,160 200,180 240,200 200,220 160,200" fill="none" stroke="${s(0.3)}" stroke-width="1.5"/></svg>`;

    case 'scan': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${[...Array(20)].map((_,i)=>`<circle cx="200" cy="200" r="${10+i*10}" fill="none" stroke="${s(0.12+i*0.01)}" stroke-width="1"/>`).join('')}<line x1="200" y1="20" x2="200" y2="380" stroke="${s(0.15)}" stroke-width="0.5"/><line x1="20" y1="200" x2="380" y2="200" stroke="${s(0.15)}" stroke-width="0.5"/><line x1="60" y1="60" x2="340" y2="340" stroke="${s(0.1)}" stroke-width="0.5"/><line x1="340" y1="60" x2="60" y2="340" stroke="${s(0.1)}" stroke-width="0.5"/></svg>`;

    case 'venn': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><circle cx="170" cy="170" r="90" fill="${s(0.06)}" stroke="${s(0.3)}" stroke-width="1.5"/><circle cx="250" cy="170" r="90" fill="${s(0.06)}" stroke="${s(0.3)}" stroke-width="1.5"/><circle cx="210" cy="240" r="90" fill="${s(0.06)}" stroke="${s(0.3)}" stroke-width="1.5"/><text x="145" y="145" text-anchor="middle" font-size="9" fill="${s(0.35)}" font-family="monospace">RF</text><text x="275" y="145" text-anchor="middle" font-size="9" fill="${s(0.35)}" font-family="monospace">EO/IR</text><text x="210" y="290" text-anchor="middle" font-size="9" fill="${s(0.35)}" font-family="monospace">SIGINT</text></svg>`;

    case 'ribbon': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice"><path d="M100,80 C150,80 160,140 200,160 C240,180 260,120 280,140 C300,160 280,220 260,240 C240,260 200,240 180,260 C160,280 180,340 200,340" fill="none" stroke="${s(0.35)}" stroke-width="8" stroke-linecap="round"/><path d="M120,100 C160,100 180,180 220,200 C260,220 300,180 320,200 C340,220 300,300 260,300" fill="none" stroke="${s(0.2)}" stroke-width="5" stroke-linecap="round"/>${[[150,100],[200,160],[260,150],[270,220],[220,250],[180,280],[200,340]].map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3" fill="${s(0.4)}"/>`).join('')}</svg>`;

    case 'warning': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';for(let y=0;y<5;y++)for(let x=0;x<6;x++){const px=35+x*65+(y%2?32:0),py=40+y*75;r+=`<polygon points="${px},${py} ${px+25},${py+42} ${px-25},${py+42}" fill="none" stroke="${s(0.25)}" stroke-width="1.5"/><text x="${px}" y="${py+32}" text-anchor="middle" font-size="14" fill="${s(0.3)}" font-family="monospace">!</text>`}return r})()}</svg>`;

    case 'dotgrid': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';const vals=['H','M','L','H','M','M','H','H','M','H','L','H','M','L','L','M','L','M','H','M','H','M','M','H','M','H','M','M','L','M','H','L','L','M','L','M'];for(let y=0;y<6;y++)for(let x=0;x<6;x++){const px=45+x*60,py=45+y*60;const v=vals[y*6+x]||'L';const op=v==='H'?0.5:v==='M'?0.25:0.08;r+=`<circle cx="${px}" cy="${py}" r="${v==='H'?10:v==='M'?7:4}" fill="${s(op)}"/>`}return r})()}</svg>`;

    case 'clusters': return `<svg class="bg-pattern" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">${(()=>{let r='';const clusters=[{cx:120,cy:150,label:'A',n:5},{cx:280,cy:150,label:'B',n:7},{cx:200,cy:300,label:'C',n:3}];clusters.forEach(cl=>{r+=`<circle cx="${cl.cx}" cy="${cl.cy}" r="60" fill="${s(0.05)}" stroke="${s(0.2)}" stroke-width="1" stroke-dasharray="4,4"/>`;r+=`<text x="${cl.cx}" y="${cl.cy+4}" text-anchor="middle" font-size="16" font-weight="800" fill="${s(0.35)}" font-family="monospace">${cl.label}</text>`;for(let i=0;i<cl.n;i++){const a=Math.PI*2*i/cl.n;const d=25+Math.random()*15;r+=`<circle cx="${cl.cx+d*Math.cos(a)}" cy="${cl.cy+d*Math.sin(a)}" r="4" fill="${s(0.3)}"/>`}});r+=`<line x1="165" y1="170" x2="235" y2="170" stroke="${s(0.2)}" stroke-width="1.5" stroke-dasharray="4,4"/>`;r+=`<line x1="145" y1="195" x2="185" y2="270" stroke="${s(0.2)}" stroke-width="1.5" stroke-dasharray="4,4"/>`;r+=`<line x1="255" y1="195" x2="215" y2="270" stroke="${s(0.2)}" stroke-width="1.5" stroke-dasharray="4,4"/>`;return r})()}</svg>`;

    default: return '';
  }
}

// ── RENDER ─────────────────────────────────────────
const grid = document.getElementById('grid');

AGENTS.forEach(agent => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.filter = agent.filter;
  card.dataset.id = agent.id;
  card.style.background = agent.bg;
  card.style.color = agent.text;

  let inner = svgPattern(agent.pattern, agent.text);

  if (agent.stat) {
    inner += `<div class="card-cell">${agent.cell}</div>`;
    inner += `<div class="card-stat">${agent.stat}</div>`;
    inner += `<div class="card-title">${agent.title}</div>`;
    inner += `<div class="card-stat-label">${agent.statLabel}</div>`;
  } else {
    inner += `<div class="card-cell">${agent.cell}</div>`;
    inner += `<div class="card-title">${agent.title}</div>`;
  }

  card.innerHTML = inner;
  card.addEventListener('click', () => openModal(agent));
  grid.appendChild(card);
});

// ── FILTERS ────────────────────────────────────────
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('.card').forEach(card => {
      if (f === 'all' || card.dataset.filter === f) {
        card.classList.remove('dim');
      } else {
        card.classList.add('dim');
      }
    });
  });
});

// ── MODAL ──────────────────────────────────────────
const overlay = document.getElementById('modal-overlay');
const modalContent = document.getElementById('modal-content');
const modalClose = document.getElementById('modal-close');

function openModal(agent) {
  let html = `<div class="color-bar" style="background:${agent.bg === '#0a0a0a' ? '#333' : agent.bg}"></div>`;
  html += `<h2>${agent.title}</h2>`;
  html += `<div class="modal-cell">${agent.cell}${agent.type === 'agent' ? ' Cell' : ''}</div>`;
  html += `<div class="modal-desc">${agent.desc}</div>`;

  html += `<div class="modal-section"><h3>Defense-Aerospace Perspective</h3><div class="modal-desc">${agent.defense}</div></div>`;

  if (agent.relevance) {
    html += `<div class="modal-section"><h3>Relevance Matrix</h3>`;
    PROJECT_TYPES.forEach(pt => {
      const val = agent.relevance[pt];
      const cls = val === 'HIGH' ? 'high' : val === 'MED' ? 'med' : 'low';
      html += `<div class="relevance-row"><span>${PROJECT_LABELS[pt]}</span><span class="val ${cls}">${val}</span></div>`;
    });
    html += `</div>`;
  }

  modalContent.innerHTML = html;
  overlay.classList.add('open');
}

modalClose.addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.remove('open');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') overlay.classList.remove('open');
});
</script>
</body>
</html>
