<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0a"/>
  <!-- Three clusters arranged triangularly -->
  <circle cx="10" cy="10" r="3.5" fill="none" stroke="#fff" stroke-width="1"/>
  <circle cx="22" cy="10" r="3.5" fill="none" stroke="#fff" stroke-width="1"/>
  <circle cx="16" cy="22" r="3.5" fill="none" stroke="#fff" stroke-width="1"/>
  <!-- Cluster centers -->
  <circle cx="10" cy="10" r="1.2" fill="#fff"/>
  <circle cx="22" cy="10" r="1.2" fill="#fff"/>
  <circle cx="16" cy="22" r="1.2" fill="#fff"/>
  <!-- Connectors (dashed) -->
  <line x1="13.5" y1="10" x2="18.5" y2="10" stroke="#fff" stroke-width="0.6" stroke-dasharray="1,1" opacity="0.7"/>
  <line x1="11.5" y1="13" x2="14.5" y2="19" stroke="#fff" stroke-width="0.6" stroke-dasharray="1,1" opacity="0.7"/>
  <line x1="20.5" y1="13" x2="17.5" y2="19" stroke="#fff" stroke-width="0.6" stroke-dasharray="1,1" opacity="0.7"/>
</svg>
